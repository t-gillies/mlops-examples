project: mlops_examples
provider: local
registry:
    registry_type: sql
    path: postgresql+psycopg://mlflow:change_me_strong@127.0.0.1:5432/feast
    cache_ttl_seconds: 60
    sqlalchemy_config_kwargs:
        echo: false
        pool_pre_ping: true
online_store:
    type: postgres
    host: localhost
    port: 5432
    database: feast
    db_schema: public
    user: mlflow
    password: change_me_strong
offline_store:
    type: postgres
    host: localhost
    port: 5432
    database: feast
    db_schema: public
    user: mlflow
    password: change_me_strong
entity_key_serialization_version: 3
