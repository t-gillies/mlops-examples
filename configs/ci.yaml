mlflow:
  tracking_uri: "http://${PUBLIC_FQDN}/${MLFLOW_BASE_PATH}"
  experiment_name: "mlops-examples/ci"
  registered_model_name: "MLOpsExamples_BreastCancer_RF"
  model_stage: ""
  tags:
    pipeline: "mlops-examples"

data:
  raw_path: "data/raw/breast_cancer.csv"
  processed_path: "data/processed/breast_cancer_transformed.csv"
  split_dir: "data/processed/splits"

split:
  seed: 42
  val_size: 0.2
  test_size: 0.2

train:
  model_type: "rf"
  seed: 42
  n_estimators: 200
  max_depth: 6
  min_samples_split: 2
  min_samples_leaf: 1
  max_features: "sqrt"

features:
  feature_store_path: "feature_store"
  feature_service_name: "patient_features"
  snapshot_dir: "data/features/current"
  manifest_path: "data/features/current/manifest.json"

artifacts:
  out_dir: "artifacts"
  model_dir: "artifacts/model"
  metrics_dir: "artifacts/metrics"
