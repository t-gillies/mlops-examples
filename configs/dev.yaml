mlflow:
  tracking_uri: "http://${PUBLIC_FQDN}/${MLFLOW_BASE_PATH}"
  experiment_name: "mlops-examples/dev"
  registered_model_name: "MLOpsExamples_BreastCancer_RF"
  model_stage: ""
  tags:
    pipeline: "mlops-examples"

data:
  path: "data/breast_cancer.csv"

train:
  model_type: "rf"      
  seed: 42
  test_size: 0.2
  n_estimators: 200
  max_depth: 6   
  min_samples_split: 2
  min_samples_leaf: 1
  max_features: "sqrt"

features:
  feast_repo: "feature_repo"
  offline_store_uri: "postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/feast"

artifacts:
  out_dir: "artifacts"
